<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PelisB — Buscador de Películas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <a class="logo" href="#">Pelis<span>B</span></a>
  <nav>
    <button class="active" onclick="showSection('peliculas', this)">Películas</button>
    <button onclick="showSection('dashboard', this)">Dashboard</button>
    <a href="/login" class="btn btn-surface btn-sm" style="text-decoration:none;display:flex;align-items:center">Admin</a>
  </nav>
</header>

<div class="search-wrap">
  <div class="search-title">BUSCAR PELÍCULA</div>
  <div class="search-row">
    <input class="search-input" id="search-input" type="text" placeholder="Escribe un título..." oninput="onSearch(this.value)">
    <button class="btn btn-accent" onclick="buscarPeliculas()">Buscar</button>
    <button class="btn btn-surface" onclick="limpiarBusqueda()">Limpiar</button>
  </div>
</div>

<div class="filter-row">
  <span class="filter-label">MOSTRAR:</span>
  <button class="filter-chip active" onclick="setFiltro('todas', this)">Todas</button>
  <button class="filter-chip" onclick="setFiltro('activas', this)">Activas</button>
</div>

<div class="filter-row" id="filter-generos">
  <span class="filter-label">GÉNERO:</span>
  <button class="filter-chip active" onclick="setGenero(null, this)">Todos</button>
</div>

<main>
  <section class="section active" id="section-peliculas">
    <div class="section-header">
      <span class="section-title">Películas</span>
      <span class="count-badge" id="count-peliculas">0 resultados</span>
    </div>
    <div class="grid" id="grid-peliculas">
      <div class="loading"><div class="spinner"></div>Cargando películas...</div>
    </div>
  </section>

  <section class="section" id="section-dashboard">
    <div class="section-title" style="margin-bottom:24px">Dashboard</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-number" id="stat-peliculas">—</div><div class="stat-label">Películas</div></div>
      <div class="stat-card"><div class="stat-number" id="stat-directores">—</div><div class="stat-label">Directores</div></div>
      <div class="stat-card"><div class="stat-number" id="stat-generos">—</div><div class="stat-label">Géneros</div></div>
      <div class="stat-card"><div class="stat-number" id="stat-rating">—</div><div class="stat-label">Rating Promedio</div></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">PELÍCULAS POR DIRECTOR</div>
      <div class="bar-chart" id="chart-directores"></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">TOP RATING POR PELÍCULA</div>
      <div class="bar-chart" id="chart-ratings"></div>
    </div>
  </section>
</main>

<div class="toast-container" id="toasts"></div>

<!-- MODAL DETALLE PELÍCULA -->
<div class="modal-overlay" id="modal-detalle">
  <div class="modal" style="max-width:680px">
    <button class="modal-close" onclick="cerrarDetalle()">✕</button>
    <div style="display:flex;gap:24px;flex-wrap:wrap">
      <div id="detalle-poster" style="width:180px;flex-shrink:0;border-radius:12px;overflow:hidden;background:var(--surface2);aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;font-size:3rem"></div>
      <div style="flex:1;min-width:200px">
        <div id="detalle-titulo" style="font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:0.04em;color:var(--accent);margin-bottom:6px"></div>
        <div id="detalle-meta" style="font-size:0.85rem;color:var(--muted);margin-bottom:16px"></div>
        <div id="detalle-rating" style="margin-bottom:16px"></div>
        <div id="detalle-generos" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px"></div>
        <div id="detalle-sinopsis" style="font-size:0.9rem;line-height:1.7;color:#c0c0c8"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-director-detalle">
  <div class="modal" style="max-width:560px">
    <button class="modal-close" onclick="cerrarDirector()">✕</button>
    <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start">
      <div id="dir-detalle-foto" style="width:120px;height:120px;border-radius:50%;overflow:hidden;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:2.5rem;flex-shrink:0;border:2px solid var(--border)"></div>
      <div style="flex:1;min-width:180px">
        <div id="dir-detalle-nombre" style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--accent);margin-bottom:4px"></div>
        <div id="dir-detalle-meta" style="font-size:0.82rem;color:var(--muted);margin-bottom:16px"></div>
        <div id="dir-detalle-bio" style="font-size:0.88rem;line-height:1.7;color:#c0c0c8"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>
<script src="/static/public.js"></script>
</body>
</html>
