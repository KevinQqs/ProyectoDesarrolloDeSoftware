<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PelisB — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<style>
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(232,197,71,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(255,107,74,0.05) 0%, transparent 60%);
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    animation: modalIn 0.3s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .login-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    color: var(--accent);
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: 0.08em;
  }

  .login-logo span { color: var(--accent2); }

  .login-subtitle {
    text-align: center;
    font-size: 0.82rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .login-error {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.85rem;
    color: var(--danger);
    margin-bottom: 16px;
    display: none;
    text-align: center;
  }

  .login-error.show { display: block; }

  .login-back {
    text-align: center;
    margin-top: 20px;
    font-size: 0.82rem;
    color: var(--muted);
  }

  .login-back a {
    color: var(--accent);
    text-decoration: none;
  }

  .login-back a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">Pelis<span>B</span></div>
    <div class="login-subtitle">Panel de Administración</div>

    <div class="login-error" id="login-error">Usuario o contraseña incorrectos</div>

    <div class="form-group">
      <label class="form-label">Usuario</label>
      <input class="form-input" id="login-user" type="text" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input class="form-input" id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn btn-accent" style="width:100%;margin-top:8px" onclick="intentarLogin()">
      Ingresar
    </button>

    <div class="login-back">
      <a href="/">← Volver al inicio</a>
    </div>
  </div>
</div>

<script>
  // Si ya está logueado, redirigir directo al admin
  if (localStorage.getItem('pelisb_auth') === 'true') {
    window.location.href = '/admin';
  }

  document.getElementById('login-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') intentarLogin();
  });

  function intentarLogin() {
    const user = document.getElementById('login-user').value.trim();
    const pass = document.getElementById('login-pass').value.trim();
    const error = document.getElementById('login-error');

    if (user === 'admin' && pass === 'pelis123') {
      localStorage.setItem('pelisb_auth', 'true');
      window.location.href = '/admin';
    } else {
      error.classList.add('show');
      document.getElementById('login-pass').value = '';
    }
  }
</script>
</body>
</html>
